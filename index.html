<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Scan</title>
<style>
body{
    background:#000;
    color:#00ff66;
    font-family:monospace;
    padding:20px;
}
#bar{
    width:100%;
    height:25px;
    border:2px solid #00ff66;
    margin-top:20px;
}
#fill{
    width:0%;
    height:100%;
    background:#00ff66;
}
h1{
    text-align:center;
}
</style>
</head>
<body>

<h1>⚠ SYSTEM SCAN ⚠</h1>

<p id="text">Memulai pemindaian...</p>

<div id="bar">
<div id="fill"></div>
</div>

<script>
let p=0;
let fill=document.getElementById("fill");
let text=document.getElementById("text");

let status=[
"Memindai file...",
"Mengecek sistem...",
"Menganalisis data...",
"Membersihkan cache...",
"Hampir selesai..."
];

let i=0;

let timer=setInterval(()=>{
    p++;
    fill.style.width=p+"%";

    if(p%20==0 && i<status.length){
        text.innerHTML=status[i];
        i++;
    }

    if(p>=100){
        clearInterval(timer);
        document.body.innerHTML="<h1 style='color:#00ff66;text-align:center;margin-top:100px;'>😂 TENANG! INI CUMA PRANK.<br>HP KAMU AMAN 😆</h1>";
    }
},80);
</script>

</body>
</html>
